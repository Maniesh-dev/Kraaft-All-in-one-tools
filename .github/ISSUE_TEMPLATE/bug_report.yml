name: Bug report
description: Report something that is broken or behaving unexpectedly
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        
        Maintainer: Maniesh Sanwal
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear summary of the issue
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps so we can reproduce it
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Paste screenshots, stack traces, or console output if helpful
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, or anything else relevant
